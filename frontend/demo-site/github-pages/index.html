<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas para Rosa Pistacho</title>
  <style>
    *{box-sizing:border-box}:root{--paper:#fffaf7;--soft:#f3e7e4;--line:#e3d4cd;--ink:#312725;--muted:#75625c;--brand:#8b4d64;--brand-dark:#6d334c}body{margin:0;background:linear-gradient(180deg,#fffaf7,#f8efeb);color:var(--ink);font-family:Arial,Helvetica,sans-serif}button,select,textarea{font:inherit}button{border:0;cursor:pointer}.shell{width:min(1120px,calc(100% - 32px));margin:0 auto;padding:28px 0}.hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:24px;align-items:end;padding:24px 0 18px}.eyebrow{margin:0 0 8px;color:var(--brand);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}h1{margin:0;color:var(--ink);font-size:42px;line-height:1.08}.subtitle{max-width:680px;margin:12px 0 0;color:var(--muted);font-size:17px;line-height:1.5}.status{min-width:210px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.75);padding:14px;color:var(--muted);display:grid;gap:4px}.status strong{color:var(--brand-dark);font-size:18px}.workspace{display:grid;grid-template-columns:300px minmax(0,1fr);gap:16px;align-items:start}.controls,.chat-panel{border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.9);box-shadow:0 18px 60px rgba(75,45,38,.08)}.controls{padding:16px;position:sticky;top:18px}label{display:block;margin-bottom:8px;font-weight:700}select,textarea{width:100%;border:1px solid #cdbeb8;border-radius:8px;background:#fff;color:var(--ink);padding:11px 12px}textarea{min-height:108px;resize:vertical;line-height:1.45}.quick-actions{display:grid;gap:8px;margin-top:16px}.quick-actions button,.secondary{width:100%;border-radius:8px;padding:10px 12px;background:var(--soft);color:var(--brand-dark);font-weight:700;text-align:left}.secondary{margin-top:16px;text-align:center}.chat-panel{min-height:680px;padding:16px}.composer{display:grid;gap:10px;border-bottom:1px solid var(--line);padding-bottom:16px}.composer button{border-radius:8px;background:var(--brand);color:white;padding:13px 16px;font-weight:700}.conversation{display:flex;flex-direction:column;gap:12px;padding-top:16px}.bubble{width:min(720px,92%);border-radius:8px;padding:14px 15px;line-height:1.48;white-space:pre-wrap}.bubble p{margin:0}.bubble span{display:block;margin-top:9px;color:var(--muted);font-size:13px}.bubble.client{align-self:flex-end;background:#efe0db}.bubble.atlas{align-self:flex-start;border:1px solid #eaded7;background:#fffdfb}@media(max-width:820px){.shell{width:min(100% - 20px,680px);padding:14px 0}.hero,.workspace{grid-template-columns:1fr}h1{font-size:32px}.subtitle{font-size:15.5px}.controls{position:static}.quick-actions{grid-template-columns:repeat(2,minmax(0,1fr))}.chat-panel{min-height:auto}.bubble{width:100%}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero"><div><p class="eyebrow">Demo temporal publicada</p><h1>Atlas para Rosa Pistacho</h1><p class="subtitle">Prueba remota para revisar textos, letras y flujo de conversacion antes de conectar WhatsApp real.</p></div><div class="status"><span>Acacias</span><strong>Validacion v0.1</strong><span>Bogota</span></div></section>
    <section class="workspace" aria-label="Chat de prueba"><aside class="controls"><label for="client">Tipo de cliente</label><select id="client"><option value="new">Cliente nuevo</option><option value="latido">Latido Coffee</option></select><div class="quick-actions"><button type="button" onclick="useExample('Hola','new')">Saludo</button><button type="button" onclick="useExample('1','new')">Cotizar</button><button type="button" onclick="useExample('3','new')">Catalogo</button><button type="button" onclick="useExample('Necesitamos 2 tortas de chocolate, 18 brownies y 12 galletas NY Oreo','latido')">Latido</button><button type="button" onclick="useExample('Gracias')">Gracias</button></div><button class="secondary" type="button" onclick="resetDemo()">Reiniciar prueba</button></aside><section class="chat-panel"><form class="composer" onsubmit="sendMessage(event)"><label for="message">Mensaje del cliente</label><textarea id="message">Hola</textarea><button type="submit">Enviar a Atlas</button></form><div id="conversation" class="conversation" aria-live="polite"></div></section></section>
  </main>
  <script>
    const address="Cra 39 # 15 - 56, Barrio Villa Aurora II, Acacias, Meta";let session={flow:null,step:null,data:{}};const conversation=document.getElementById('conversation');function normalize(v){return v.toLowerCase().trim()}function isGreeting(m){return ['hola','buenas','buen dia','buenas tardes','buenas noches'].some(x=>m.includes(x))}function isThanks(m){return ['gracias','muchas gracias','mil gracias','listo gracias'].some(x=>m.includes(x))}function addMessage(from,text,meta){const b=document.createElement('article');b.className='bubble '+from;const p=document.createElement('p');p.textContent=text;b.appendChild(p);if(meta){const s=document.createElement('span');s.textContent=meta;b.appendChild(s)}conversation.prepend(b)}function mainMenu(){return 'Hola. Que alegria tenerte aqui. Bienvenido(a) a Rosa Pistacho. Estamos felices de acompanarte y ayudarte a encontrar justo lo que buscas. En que podemos ayudarte hoy?\n\nDeseas:\n1. Cotizar una torta personalizada\n2. Realizar un pedido\n3. Catalogo\n4. Consultar un pedido\n5. Conocer horarios\n6. Quiero que mi cafe sea cliente frecuente'}function unknownMenu(){return 'Gracias por escribir a Rosa Pistacho. Para ayudarte mejor, responde con una opcion:\n\n1. Cotizar una torta personalizada\n2. Realizar un pedido\n3. Ver catalogo\n4. Consultar un pedido\n5. Conocer horarios\n6. Informacion para cafes frecuentes'}function resetDemo(){conversation.innerHTML='';session={flow:null,step:null,data:{}};document.getElementById('message').value='Hola';addMessage('atlas','Esta es una demo temporal para que Rosa Pistacho revise textos, letras y flujo de conversacion antes de conectar WhatsApp real.','Prueba remota para Acacias')}function useExample(text,type){if(type){document.getElementById('client').value=type;session={flow:null,step:null,data:{}}}document.getElementById('message').value=text}function latidoReply(m){if(isThanks(m))return ['Gracias a ustedes, Latidos. Nos alegra mucho que sigan eligiendo a Rosa Pistacho. Dejamos la informacion registrada para continuar con el proceso.','Cliente frecuente'];if(m==='1'||m==='2'||isGreeting(m))return ['Buen dia, Latidos. Que gusto atenderlos nuevamente. Por favor envianos el pedido con los productos y cantidades que necesitan. Por ejemplo: 2 tortas de chocolate, 18 brownies y 12 galletas NY Oreo.','Cliente frecuente'];if(m.includes('torta')||m.includes('brownie')||m.includes('galleta'))return ['Perfecto, Latidos. Este es el resumen de tu pedido:\n\n- 2 x Torta de Chocolate: $108.000 COP\n- 18 x Brownie: $144.000 COP\n- 12 x Galleta NY Oreo: $54.000 COP\n\nTotal: $306.000 COP\n\nRegistraremos el pedido para preparacion segun las condiciones acordadas con Rosa Pistacho.','Pedido frecuente'];return ['Por favor envianos el pedido con productos y cantidades. Por ejemplo: 2 tortas de chocolate, 18 brownies y 12 galletas NY Oreo.','Cliente frecuente']}function reply(raw){const client=document.getElementById('client').value;const m=normalize(raw);if(client==='latido'){const r=latidoReply(m);session={flow:null,step:null,data:{}};return r}if(isThanks(m)){session={flow:null,step:null,data:{}};return ['Gracias a ti por elegir a Rosa Pistacho. Nos alegra poder acompanarte y ayudarte con tu pedido.','Cierre amable']}if(session.flow==='quote'&&session.step==='people'){session={flow:'quote',step:'reference',data:{...session.data,people:raw}};return ['Perfecto. Tienes una imagen de referencia? Si la tienes, por favor enviala en este chat.\n\nTen presente que en Rosa Pistacho no trabajamos con imagenes obscenas o contenido inapropiado.','Cotizacion']}if(session.flow==='quote'&&session.step==='reference'){const text='Gracias. Ya tenemos la informacion inicial para cotizar tu torta personalizada:\n\n- Personas: '+(session.data.people||'pendiente')+'\n- Imagen de referencia: '+raw+'\n\nLa pastelera de Rosa Pistacho revisara los detalles y te compartira la cotizacion.';session={flow:null,step:null,data:{}};return [text,'Revision de pastelera']}if(session.flow==='order'&&session.step==='name'){session={flow:'order',step:'date',data:{...session.data,name:raw}};return ['Gracias. Para que fecha necesitas el pedido?','Pedido']}if(session.flow==='order'&&session.step==='date'){session={flow:'order',step:'product',data:{...session.data,date:raw}};return ['Perfecto. Que tipo de producto necesitas?','Pedido']}if(session.flow==='order'&&session.step==='product'){session={flow:'order',step:'people',data:{...session.data,product:raw}};return ['Entendido. Para cuantas personas es?','Pedido']}if(session.flow==='order'&&session.step==='people'){session={flow:'order',step:'reference',data:{...session.data,people:raw}};return ['Gracias. Por favor envia la imagen de referencia de la torta o cuentanos si no tienes una.','Pedido']}if(session.flow==='order'&&session.step==='reference'){const text='Gracias. Ya tenemos la informacion inicial de tu pedido:\n\n- Nombre: '+(session.data.name||'pendiente')+'\n- Fecha de entrega: '+(session.data.date||'pendiente')+'\n- Tipo de producto: '+(session.data.product||'pendiente')+'\n- Personas: '+(session.data.people||'pendiente')+'\n- Imagen de referencia: '+raw+'\n\nRecuerda que los pedidos se recogen en: '+address+'. Una asesora revisara la informacion y continuara el proceso.';session={flow:null,step:null,data:{}};return [text,'Revision humana']}if(isGreeting(m)){session={flow:null,step:null,data:{}};return [mainMenu(),'Menu principal']}if(m==='1'||m.includes('cotizar')){session={flow:'quote',step:'people',data:{}};return ['Perfecto, con gusto te ayudamos a cotizar tu torta personalizada. Para empezar: para cuantas personas es la torta?','Cotizacion']}if(m==='2'||m.includes('pedido')){session={flow:'order',step:'name',data:{}};return ['Listo. Para realizar tu pedido, empecemos por el nombre. A nombre de quien registramos el pedido?\n\nImportante: Rosa Pistacho no realiza domicilios. Los pedidos se recogen en: '+address+'.','Pedido']}if(m==='3'||m.includes('catalogo')||m.includes('precio')){session={flow:null,step:null,data:{}};return ['Claro. Puedes consultar el catalogo de Rosa Pistacho en este PDF:\n\n'+location.origin+location.pathname.replace(/[^/]*$/,'')+'catalogo-rosa-pistacho.pdf\n\nLas tortas personalizadas se cotizan segun el diseno.','Catalogo PDF']}if(m==='4'||m.includes('consultar'))return ['Claro. Para consultar tu pedido, por favor enviame el numero de pedido.','Consulta de pedido'];if(m==='5'||m.includes('horario')||m.includes('domingo'))return ['Nuestro horario de atencion es:\n\nLunes a viernes: 9:00 a.m. a 12:00 p.m. y 2:00 p.m. a 6:00 p.m.\nSabados: 9:00 a.m. a 5:00 p.m.\nDomingos: cerrado.','Horarios'];if(m==='6'||m.includes('cliente frecuente'))return ['Nos encanta que quieras que tu cafe trabaje con Rosa Pistacho! Por favor dejanos el nombre del cafe, nombre de contacto y numero de telefono. Rosa Pistacho revisara la informacion y se pondra en contacto contigo.','Cafe frecuente'];if(m.includes('domicilio')||m.includes('domicilios'))return ['Rosa Pistacho no realiza domicilios.\n\nPuedes recoger tu pedido en: '+address+'.','Domicilios'];return [unknownMenu(),'Guia']}function sendMessage(e){e.preventDefault();const input=document.getElementById('message');const value=input.value.trim();if(!value)return;const client=document.getElementById('client').value==='latido'?'Modo cliente frecuente: Latido Coffee':'Modo cliente nuevo';addMessage('client',value,client);const r=reply(value);addMessage('atlas',r[0],r[1]);input.value=''}resetDemo();
  </script>
</body>
</html>
